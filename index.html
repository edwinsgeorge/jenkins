<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ammu Kutty ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', cursive;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 80px;
        font-size: 3rem;
        animation: fadeIn 2s ease-in-out;
    }

    p {
        font-size: 1.4rem;
        margin: 20px;
        animation: fadeIn 3s ease-in-out;
    }

    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: floatUp 6s linear infinite;
    }

    button {
        padding: 12px 25px;
        font-size: 1rem;
        border: none;
        border-radius: 25px;
        background: #ff4d6d;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff1e4d;
        transform: scale(1.1);
    }

    #message {
        margin-top: 20px;
        font-size: 1.5rem;
        display: none;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(100vh);
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>
</head>

<body>

<h1>💖 Ammu Kutty 💖</h1>
<p>You are the most beautiful part of my life 💕</p>

<button onclick="showLove()">Click for Surprise 😍</button>

<div id="message">I LOVE YOU SO MUCH ❤️🥺</div>

<script>
    function showLove() {
        document.getElementById("message").style.display = "block";
    }

    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 15 + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
